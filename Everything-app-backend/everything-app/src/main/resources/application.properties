spring.application.name=everything-app
# Datenbank-Konfiguration
spring.datasource.url=jdbc:postgresql://localhost:5432/everything_app
spring.datasource.username=postgres
spring.datasource.password=FCB&Finn
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Einstellungen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server-Port
server.port=8080

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.yourname.productivityapp=DEBUG